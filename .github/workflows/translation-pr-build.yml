name: Translation PR Build

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to build manually
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      ((github.event.pull_request.user.login == 'Copilot' ||
      github.event.pull_request.user.login == 'app/copilot-swe-agent' ||
      github.event.pull_request.user.login == 'copilot-swe-agent[bot]' ||
      startsWith(github.event.pull_request.head.ref, 'copilot/')) &&
      startsWith(github.event.pull_request.title, '[translation]'))
    runs-on: ubuntu-latest

    steps:
      - name: Resolve pull request metadata
        id: pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            pr_json=$(gh pr view "${{ inputs.pr_number }}" --repo "${{ github.repository }}" --json number,headRefName,headRefOid,title,author)
            echo "number=$(echo "$pr_json" | jq -r '.number')" >> "$GITHUB_OUTPUT"
            echo "head_ref=$(echo "$pr_json" | jq -r '.headRefName')" >> "$GITHUB_OUTPUT"
            echo "head_sha=$(echo "$pr_json" | jq -r '.headRefOid')" >> "$GITHUB_OUTPUT"
            echo "title=$(echo "$pr_json" | jq -r '.title')" >> "$GITHUB_OUTPUT"
            echo "author=$(echo "$pr_json" | jq -r '.author.login')" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "head_ref=${{ github.event.pull_request.head.ref }}" >> "$GITHUB_OUTPUT"
            echo "head_sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
            echo "title=${{ github.event.pull_request.title }}" >> "$GITHUB_OUTPUT"
            echo "author=${{ github.event.pull_request.user.login }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop if manual target is not an eligible translation PR
        if: >-
          github.event_name == 'workflow_dispatch' &&
          ((steps.pr.outputs.author != 'Copilot' &&
          steps.pr.outputs.author != 'app/copilot-swe-agent' &&
          steps.pr.outputs.author != 'copilot-swe-agent[bot]' &&
          !startsWith(steps.pr.outputs.head_ref, 'copilot/')) ||
          !startsWith(steps.pr.outputs.title, '[translation]'))
        run: |
          echo "The specified PR is not an eligible translation PR."
          exit 1

      - name: Check out pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
