name: Close Translation Issues

on:
  pull_request_target:
    types:
      - closed
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to process manually
        required: true
        type: string

permissions:
  issues: write
  pull-requests: read
  contents: read

jobs:
  close-issues:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Resolve pull request number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "pr_number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Close parent translation issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/close-translation-issues.mjs --pr=${{ steps.pr.outputs.pr_number }}