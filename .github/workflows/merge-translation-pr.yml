name: Merge Translation PR

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to merge manually
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve pull request metadata
        id: pr
        run: |
          pr_number="${{ inputs.pr_number }}"
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Stop when no pull request number is available
        if: steps.pr.outputs.pr_number == ''
        run: echo "No pull request number found for this event."

      - name: Check out repository
        if: steps.pr.outputs.pr_number != ''
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: steps.pr.outputs.pr_number != ''
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Merge eligible translation PR
        if: steps.pr.outputs.pr_number != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          args=("--pr=${{ steps.pr.outputs.pr_number }}")
          node scripts/merge-translation-pr.mjs "${args[@]}"
