name: Translation Request
description: 日本語ソースから多言語記事や著者紹介の翻訳を依頼する
title: "[translation] "
body:
  - type: markdown
    attributes:
      value: |
        Pages CMS では日本語ソースのみを管理します。
        この issue は多言語反映を AI に依頼するためのテンプレートです。

        完了条件:
        - 指定ロケールの翻訳ファイルが追加または更新されている
        - 必要なら `src/data/authors.json` の `i18n` も更新されている
        - 画像や frontmatter は日本語ソースと整合している

  - type: dropdown
    id: content-kind
    attributes:
      label: 対象の種類
      options:
        - Blog post
        - Author profile
        - Both
        - Other
    validations:
      required: true

  - type: input
    id: source-path
    attributes:
      label: 日本語ソースのパス
      description: "例: src/content/blog/tax-return-with-copilot.md"
      placeholder: src/content/blog/example.md
    validations:
      required: true

  - type: checkboxes
    id: target-locales
    attributes:
      label: 対象ロケール
      options:
        - label: en
        - label: zh-cn
        - label: es
        - label: pt
        - label: fr
        - label: ko
        - label: de
        - label: ru
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 依頼内容
      description: 翻訳対象、タグ、著者、画像、用語統一などを記入
      placeholder: |
        - 日本語ソースを元に全文翻訳
        - タグは既存の翻訳ポリシーに合わせる
        - 画像は日本語ソースを踏襲
        - 著者 bio / skills の i18n も必要なら更新
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: 制約・注意点
      description: 固有名詞、訳さない語、トーン、公開期限など
      placeholder: |
        - GitHub Copilot は訳語を統一すること
        - Acecore, Pages CMS, Cloudflare は原語維持
        - 直訳より自然さ優先

  - type: textarea
    id: completion-checklist
    attributes:
      label: 完了チェック
      value: |
        - [ ] 対象ロケールのファイルを追加または更新
        - [ ] frontmatter の title / description / tags / image / author を確認
        - [ ] 本文中リンクと画像パスを確認
        - [ ] 必要なら `src/data/authors.json` の i18n を更新
        - [ ] `npm run build` 相当の整合性を確認
