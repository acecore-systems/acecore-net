            label: 出典
            widget: string
            required: false
      - name: statBar
        label: 統計バー
        widget: object
        required: false
        collapsed: auto
        fields:
          - name: items
            label: 項目
            widget: list
            collapsed: true
            summary: '{{value}} {{label}}'
            fields:
              - name: value
                label: 値
                widget: string
