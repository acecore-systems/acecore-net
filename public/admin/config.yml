              - name: icon
                label: アイコン
                widget: string
              - name: accent
                label: アクセント
                widget: select
                options: [brand, emerald, amber, slate]
                required: false
      - name: compareTable
        label: 比較表
        widget: object
        required: false
        collapsed: auto
        fields:
