                label: ラベル
                widget: string
              - name: items
                label: 項目
                widget: list
      - name: checklist
        label: チェックリスト
        widget: object
        required: false
        collapsed: auto
        fields:
          - name: title
            label: 見出し
            widget: string
            required: false
          - name: items
            label: 項目
            widget: list
            collapsed: true
            summary: '{{text}}'
            fields:
