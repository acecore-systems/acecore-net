          - name: steps
            label: ステップ
            widget: list
            collapsed: true
            summary: '{{title}}'
            fields:
              - name: title
                label: タイトル
                widget: string
              - name: description
                label: 説明
                widget: text
              - name: icon
                label: アイコン
                widget: string
              - name: accent
                label: アクセント
                widget: select
                options: [brand, emerald, amber, slate]
                required: false
      - name: compareTable
        label: 比較表
        widget: object
        required: false
        collapsed: auto
        fields:
          - name: title
            label: 見出し
            widget: string
            required: false
          - name: before
            label: 比較前
            widget: object
            fields:
              - name: label
                label: ラベル
                widget: string
              - name: items
                label: 項目
                widget: list
          - name: after
            label: 比較後
            widget: object
            fields:
              - name: label
                label: ラベル
                widget: string
              - name: items
                label: 項目
                widget: list
      - name: checklist
        label: チェックリスト
        widget: object
        required: false
        collapsed: auto
        fields:
          - name: title
            label: 見出し
            widget: string
            required: false
          - name: items
            label: 項目
            widget: list
            collapsed: true
            summary: '{{text}}'
            fields:
              - name: text
                label: テキスト
                widget: text
              - name: checked
                label: 完了
                widget: boolean
                required: false
      - name: insightGrid
        label: インサイトグリッド
        widget: object
        required: false
        collapsed: auto
        fields:
          - name: eyebrow
            label: 補助見出し
            widget: string
            required: false
          - name: title
            label: タイトル
            widget: string
          - name: description
            label: 説明
            widget: text
            required: false
          - name: variant
            label: 表示形式
            widget: select
            options: [card, inline]
            required: false
          - name: items
            label: 項目
            widget: list
            collapsed: true
            summary: '{{title}}'
            fields:
              - name: title
                label: タイトル
                widget: string
              - name: description
                label: 説明
                widget: text
              - name: icon
                label: アイコン
                widget: string
              - name: tone
                label: トーン
                widget: select
                options: [brand, emerald, amber, slate]
                required: false
      - name: testimonials
        label: お客様の声
        widget: list
        required: false
        collapsed: true
        summary: '{{name}}'
        fields:
          - name: quote
            label: 引用
            widget: text
          - name: name
            label: 名前
            widget: string
          - name: role
            label: 肩書き
            widget: string
            required: false
      - name: pullQuote
        label: 引用強調
        widget: object
        required: false
        collapsed: auto
        fields:
          - name: text
            label: テキスト
            widget: text
          - name: attribution
            label: 出典
            widget: string
            required: false
      - name: statBar
        label: 統計バー
        widget: object
        required: false
        collapsed: auto
        fields:
          - name: items
            label: 項目
            widget: list
            collapsed: true
            summary: '{{value}} {{label}}'
            fields:
              - name: value
                label: 値
                widget: string
