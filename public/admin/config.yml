    slug: '{{fields.id}}'
    summary: '{{name}} ({{id}})'
    sortable_fields:
      fields: [name, id]
      default:
        field: name
        direction: ascending
    fields:
      - name: id
        label: ID
        widget: string
      - name: name
        label: タグ名
        widget: string
      - name: i18n
        label: 多言語
        widget: object
        required: false
        collapsed: true
        fields:
          - name: en
            label: 英語
            widget: object
            required: false
            fields: &tag_locale_fields
              - name: name
                label: 名前
                widget: string
                required: false
          - name: zh-cn
            label: 简体中文
            widget: object
            required: false
            fields: *tag_locale_fields
          - name: es
            label: Español
            widget: object
            required: false
            fields: *tag_locale_fields
          - name: pt
            label: Português
            widget: object
            required: false
            fields: *tag_locale_fields
          - name: fr
            label: Français
            widget: object
            required: false
            fields: *tag_locale_fields
          - name: ko
            label: 한국어
            widget: object
            required: false
            fields: *tag_locale_fields
          - name: de
            label: ドイツ語
            widget: object
            required: false
            fields: *tag_locale_fields
          - name: ru
            label: Русский
            widget: object
            required: false
            fields: *tag_locale_fields
