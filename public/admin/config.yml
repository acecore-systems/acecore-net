  - name: campaigns
    label: 告知・キャンペーン
    label_singular: 告知・キャンペーン
    icon: campaign
    description: トップ告知バナーとページ内キャンペーン通知を1件ずつ編集します。他言語は Copilot translation PR task で更新します。
    folder: src/i18n/source/ja/campaigns
    extension: json
    format: json
    create: true
    identifier_field: adminTitle
    slug: '{{fields.id}}'
    summary: '{{adminTitle}}'
    fields:
      - name: 'id'
        label: '管理ID'
        hint: 'ファイル名にも使われます。例: site-renewal-2026'
        widget: string
      - name: 'type'
        label: '種別'
        hint: 'トップに出す告知か、ページ内の指定位置に出す通知かを選びます。'
        widget: select
        options:
          - { label: 'トップ告知バナー', value: announcement }
          - { label: 'ページ内キャンペーン通知', value: page-notice }
        default: page-notice
      - name: 'adminTitle'
        label: '一覧表示名'
        hint: 'CMSの一覧で見分けるための名前です。サイトには表示されません。'
        widget: string
      - name: 'enabled'
        label: '表示する'
        widget: boolean
        default: true
      - name: 'page'
        label: '表示ページ'
        hint: 'ページ内通知で使います。表示場所は各ページのヒーロー下に固定されます。'
        widget: select
        options:
          - { label: 'トップページ', value: home }
          - { label: 'サービス', value: services }
          - { label: '実績', value: works }
          - { label: '会社概要', value: about }
          - { label: 'お問い合わせ', value: contact }
          - { label: 'AceStudio', value: acestudio }
        required: false
      - name: 'title'
        label: 'タイトル'
        hint: 'トップ告知バナーでは小さなラベル、ページ内キャンペーン通知では見出しとして表示します。'
        widget: string
        required: false
      - name: 'body'
        label: '本文'
        hint: 'トップ告知バナーとページ内キャンペーン通知で表示する本文です。'
        widget: text
        required: false
      - name: 'href'
        label: 'リンクURL'
        widget: string
        required: false
      - name: 'ctaLabel'
        label: 'ボタン文言'
        widget: string
        required: false
      - name: 'icon'
        label: 'アイコン'
        hint: 'ページ内通知で使うアイコンです。用途に近いアイコンを選んでください。'
        widget: select
        dropdown_threshold: 99
        options:
          - { label: '🗓️ 募集・受付', value: calendar-check }
          - { label: '📣 お知らせ', value: megaphone }
          - { label: '💬 相談・問い合わせ', value: message-circle }
          - { label: '🎓 学校・講座', value: graduation-cap }
          - { label: '⏰ 締切・期限', value: alarm-clock }
          - { label: '✅ 完了・受付中', value: circle-check }
          - { label: '✨ 注目・おすすめ', value: sparkles }
          - { label: '🏷️ キャンペーン', value: tag }
          - { label: '💼 法人・仕事', value: briefcase-business }
          - { label: '👥 参加者・コミュニティ', value: users }
        default: calendar-check
        required: false
      - name: 'tone'
        label: '表示トーン'
        widget: select
        options:
          - { label: '🔵 ブランド（通常）', value: brand }
          - { label: '🟡 募集・注意', value: amber }
          - { label: '🟢 受付中・成功', value: emerald }
          - { label: '⚪ 控えめ', value: slate }
        default: brand
      - name: 'startsAt'
        label: '表示開始日時'
        hint: '空欄なら開始制限なし。訪問者の表示時刻（日本時間）で判定します。'
        widget: datetime
        format: YYYY-MM-DDTHH:mm
        required: false
      - name: 'endsAt'
        label: '表示終了日時'
        hint: '空欄なら終了制限なし。訪問者の表示時刻（日本時間）で判定します。'
        widget: datetime
        format: YYYY-MM-DDTHH:mm
        required: false
      - name: 'order'
        label: '表示順'
        hint: '数字が小さいほど先に表示されます。'
        widget: number
        value_type: int
        default: 100
        required: false

