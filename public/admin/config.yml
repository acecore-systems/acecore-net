# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms@0.166.0/schema/sveltia-cms.json

backend:
  name: github
  repo: acecore-systems/acecore-net
  branch: cms-content
  base_url: https://sveltia-cms-auth.sparkling-tree-7cef.workers.dev
  auth_methods: [oauth]
  commit_messages:
    create: 'cms: create {{collection}} "{{slug}}"'
    update: 'cms: update {{collection}} "{{slug}}"'
    delete: 'cms: delete {{collection}} "{{slug}}"'
    uploadMedia: 'cms: upload "{{path}}"'
    deleteMedia: 'cms: delete media "{{path}}"'

media_folder: /public/uploads
public_folder: /uploads

collections:
  - name: blog
    label: ブログ
    label_singular: ブログ記事
    icon: article
    description: 日本語ソース記事のみを編集します。翻訳記事は Copilot translation PR task で更新します。
    folder: src/content/blog
    slug: '{{fields._slug}}'
    preview_path: blog/{{slug}}/
    summary: '{{title}} - {{date}}'
    thumbnail: [uploadedImage, image]
    sortable_fields:
      fields: [date, title, author, slug]
      default:
        field: date
        direction: descending
    fields:
      - name: title
        label: タイトル
        widget: string
      - name: description
        label: 概要
        widget: text
      - name: date
        label: 公開日
        widget: datetime
        format: YYYY-MM-DDTHH:mm
        default: '{{now}}'
      - name: lastUpdated
        label: 最終更新日
        widget: datetime
        format: YYYY-MM-DDTHH:mm
        required: false
      - name: tags
        label: タグ
        widget: relation
        collection: tags
        value_field: name
        display_fields: ['{{name}} ({{id}})']
        search_fields: [name, id]
        multiple: true
        required: false
      - name: image
        label: 外部画像URL
        widget: string
        required: false
      - name: uploadedImage
        label: アップロード画像
        widget: image
        required: false
      - name: author
        label: 著者
        widget: relation
        collection: authors
        value_field: id
        display_fields: ['{{name}} ({{id}})']
        search_fields: [name, id]
      - name: callout
        label: コールアウト
        widget: object
        required: false
        collapsed: auto
        fields:
          - name: type
            label: 種別
            widget: select
            dropdown_threshold: 99
            options:
              - { label: 'ℹ️ 情報', value: info }
              - { label: '⚠️ 注意', value: warning }
              - { label: '💡 ヒント', value: tip }
              - { label: '🔖 補足', value: note }
            default: info
          - name: title
            label: 見出し
            widget: string
            required: false
          - name: text
            label: 本文
            widget: text
      - name: timeline
        label: タイムライン
        widget: object
        required: false
        collapsed: auto
        fields:
          - name: title
            label: 見出し
            widget: string
            required: false
          - name: items
            label: 項目
            widget: list
            collapsed: true
            summary: '{{date}} {{title}}'
            fields:
              - name: date
                label: 日付
                widget: string
              - name: title
                label: タイトル
                widget: string
              - name: description
                label: 説明
                widget: text
                required: false
      - name: youtube
        label: YouTube
        widget: object
        required: false
        collapsed: auto
        fields:
          - name: videoId
            label: 動画ID
            widget: string
          - name: title
            label: タイトル
            widget: string
            required: false
          - name: caption
