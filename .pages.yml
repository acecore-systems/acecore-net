content:
  - name: blog
    label: ブログ
    path: src/content/blog
    type: collection
    exclude:
      - en/**
      - zh-cn/**
      - es/**
      - pt/**
      - fr/**
      - ko/**
      - de/**
      - ru/**
    view:
      fields: [title, date, author]
      sort: date
      order: desc
    fields:
      - name: title
        label: タイトル
        type: string
        required: true
      - name: description
        label: 概要
        type: text
        required: true
      - name: date
        label: 公開日
        type: date
        time: true
        required: true
      - name: tags
        label: タグ
        type: string
        list: true
      - name: image
        label: 画像URL
        type: string
      - name: uploadedImage
        label: アップロード画像
        type: image
      - name: author
        label: 著者
        type: string
      - name: body
        label: 本文
        type: rich-text
  - name: authors
    label: 著者情報
    path: src/data/authors.json
    type: file
    format: json
    list: true
    fields:
      - name: id
        label: ID
        type: string
        required: true
      - name: name
        label: 名前
        type: string
        required: true
      - name: avatar
        label: アバターURL
        type: string
      - name: avatarImage
        label: アバター画像
        type: image
      - name: bio
        label: 自己紹介（日本語）
        type: text
      - name: url
        label: WebサイトURL
        type: string
      - name: github
        label: GitHub URL
        type: string
      - name: twitter
        label: X (Twitter) URL
        type: string
      - name: skills
        label: スキル（日本語）
        type: string
        list: true
      - name: i18n
        label: 多言語
        type: object
        hidden: true
        readonly: true
        fields:
          - name: en
            label: English
            type: object
            fields:
              - name: bio
                label: Bio
                type: text
              - name: skills
                label: Skills
                type: string
                list: true
          - name: zh-cn
            label: 简体中文
            type: object
            fields:
              - name: bio
                label: 简介
                type: text
              - name: skills
                label: 技能
                type: string
                list: true
          - name: es
            label: Español
            type: object
            fields:
              - name: bio
                label: Biografía
                type: text
              - name: skills
                label: Habilidades
                type: string
                list: true
          - name: pt
            label: Português
            type: object
            fields:
              - name: bio
                label: Bio
                type: text
              - name: skills
                label: Competências
                type: string
                list: true
          - name: fr
            label: Français
            type: object
            fields:
              - name: bio
                label: Bio
                type: text
              - name: skills
                label: Compétences
                type: string
                list: true
          - name: ko
            label: 한국어
            type: object
            fields:
              - name: bio
                label: 소개
                type: text
              - name: skills
                label: 기술
                type: string
                list: true
          - name: de
            label: Deutsch
            type: object
            fields:
              - name: bio
                label: Bio
                type: text
              - name: skills
                label: Kompetenzen
                type: string
                list: true
          - name: ru
            label: Русский
            type: object
            fields:
              - name: bio
                label: Описание
                type: text
              - name: skills
                label: Навыки
                type: string
                list: true

media:
  input: public/uploads
  output: /uploads
