content:
  - name: blog
    label: ブログ
    path: src/content/blog
    type: collection
    exclude:
      - en/**
      - zh-cn/**
      - es/**
      - pt/**
      - fr/**
      - ko/**
      - de/**
      - ru/**
    view:
      fields: [title, date, author]
      sort: date
      order: desc
    fields:
      - name: title
        label: タイトル
        type: string
        required: true
      - name: description
        label: 概要
        type: text
        required: true
      - name: date
        label: 公開日
        type: date
        required: true
        options:
          time: true
          format: "yyyy-MM-dd'T'HH:mm"
      - name: tags
        label: タグ
        type: select
        options:
          multiple: true
          values:
            - Acecore Schools
            - Astro
            - Cloudflare
            - CMS
            - DNS
            - GitHub Copilot
            - i18n
            - SEO
            - Starlight
            - VS Code
            - Webサイト
            - Web制作
            - アクセシビリティ
            - イベント
            - インフラ
            - オープンソース
            - お知らせ
            - コミュニティ
            - サービス
            - システム開発
            - セキュリティ
            - パフォーマンス
            - メール
            - 技術
            - 教育
      - name: image
        label: 画像URL
        type: string
      - name: uploadedImage
        label: アップロード画像
        type: image
      - name: author
        label: 著者
        type: select
        options:
          values:
            - name: gui
              label: Gui
            - name: hatt
              label: ハット
      - name: body
        label: 本文
        type: rich-text
  - name: authors
    label: 著者
    path: src/content/authors
    type: collection
    format: json
    filename: "{fields.id}.json"
    view:
      primary: name
      fields: [name, id]
      sort: name
      order: asc
    fields:
      - name: id
        label: ID
        type: string
        required: true
      - name: name
        label: 名前
        type: string
        required: true
      - name: avatar
        label: アバターURL
        type: string
      - name: avatarImage
        label: アバター画像
        type: image
      - name: bio
        label: 自己紹介（日本語）
        type: text
      - name: url
        label: WebサイトURL
        type: string
      - name: github
        label: GitHub URL
        type: string
      - name: twitter
        label: X (Twitter) URL
        type: string
      - name: skills
        label: スキル（日本語）
        type: string
        list: true
      - name: i18n
        label: 多言語
        type: object
        hidden: true
        readonly: true
        fields:
          - name: en
            label: English
            type: object
            fields:
              - name: name
                label: Name
                type: string
              - name: bio
                label: Bio
                type: text
              - name: skills
                label: Skills
                type: string
                list: true
          - name: zh-cn
            label: 简体中文
            type: object
            fields:
              - name: name
                label: 名称
                type: string
              - name: bio
                label: 简介
                type: text
              - name: skills
                label: 技能
                type: string
                list: true
          - name: es
            label: Español
            type: object
            fields:
              - name: name
                label: Nombre
                type: string
              - name: bio
                label: Biografía
                type: text
              - name: skills
                label: Habilidades
                type: string
                list: true
          - name: pt
            label: Português
            type: object
            fields:
              - name: name
                label: Nome
                type: string
              - name: bio
                label: Bio
                type: text
              - name: skills
                label: Competências
                type: string
                list: true
          - name: fr
            label: Français
            type: object
            fields:
              - name: name
                label: Nom
                type: string
              - name: bio
                label: Bio
                type: text
              - name: skills
                label: Compétences
                type: string
                list: true
          - name: ko
            label: 한국어
            type: object
            fields:
              - name: name
                label: 이름
                type: string
              - name: bio
                label: 소개
                type: text
              - name: skills
                label: 기술
                type: string
                list: true
          - name: de
            label: Deutsch
            type: object
            fields:
              - name: name
                label: Name
                type: string
              - name: bio
                label: Bio
                type: text
              - name: skills
                label: Kompetenzen
                type: string
                list: true
          - name: ru
            label: Русский
            type: object
            fields:
              - name: name
                label: Имя
                type: string
              - name: bio
                label: Описание
                type: text
              - name: skills
                label: Навыки
                type: string
                list: true
  - name: tags
    label: タグ
    path: src/content/tags
    type: collection
    format: json
    filename: "{fields.id}.json"
    view:
      primary: name
      fields: [name, id]
      sort: name
      order: asc
    fields:
      - name: id
        label: ID
        type: string
        required: true
      - name: name
        label: タグ名
        type: string
        required: true
      - name: i18n
        label: 多言語
        type: object
        hidden: true
        readonly: true
        fields:
          - name: en
            label: English
            type: object
            fields:
              - name: name
                label: Name
                type: string
          - name: zh-cn
            label: 简体中文
            type: object
            fields:
              - name: name
                label: 名称
                type: string
          - name: es
            label: Español
            type: object
            fields:
              - name: name
                label: Nombre
                type: string
          - name: pt
            label: Português
            type: object
            fields:
              - name: name
                label: Nome
                type: string
          - name: fr
            label: Français
            type: object
            fields:
              - name: name
                label: Nom
                type: string
          - name: ko
            label: 한국어
            type: object
            fields:
              - name: name
                label: 이름
                type: string
          - name: de
            label: Deutsch
            type: object
            fields:
              - name: name
                label: Name
                type: string
          - name: ru
            label: Русский
            type: object
            fields:
              - name: name
                label: Имя
                type: string

media:
  input: public/uploads
  output: /uploads
